<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Travel-PA</title>
    <style>
        :root {
            --primary: #0062FF;
            --primary-hover: #0052D6;
            --primary-light: #F0F6FF;
            --bg: #F8FAFC;
            --card-bg: #FFFFFF;
            --text: #1F2937;
            --muted: #9CA3AF;
            --border: #E5E7EB;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

        .card {
            background: var(--card-bg); width: 100%; max-width: 480px;
            padding: 48px 40px; border-radius: 16px;
            border: 1px solid var(--border); box-shadow: 0 4px 24px rgba(0,0,0,0.05);
        }

        /* Logo */
        .logo-wrap { display: flex; justify-content: center; margin-bottom: 28px; }
        .logo-wrap img { width: 150px; height: auto; }

        /* Title */
        h1 { font-size: 26px; font-weight: 700; color: var(--text); text-align: center; margin-bottom: 28px; }

        /* Tabs */
        .tabs { display: flex; border: 1px solid var(--border); border-radius: 8px; padding: 4px; margin-bottom: 28px; gap: 4px; }
        .tab-btn {
            flex: 1; padding: 11px; border: none; background: transparent;
            font-size: 14px; font-weight: 600; color: #4B5563; cursor: pointer;
            border-radius: 6px; transition: all 0.18s;
        }
        .tab-btn.active { background: var(--primary-light); color: var(--primary); }

        /* Error */
        .error-box {
            color: #EF4444; background: #FEF2F2; border: 1px solid #FEE2E2;
            padding: 12px 14px; border-radius: 8px; font-size: 13px;
            margin-bottom: 20px; display: none; text-align: center;
        }

        /* Fields */
        .field { margin-bottom: 20px; }
        .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
        .input-wrap { position: relative; display: flex; align-items: center; }
        .input-wrap input {
            width: 100%; padding: 13px 16px 13px 44px;
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 14px; color: var(--text); outline: none; transition: border-color 0.18s;
        }
        .input-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,98,255,0.08); }
        .input-wrap input::placeholder { color: var(--muted); }
        .ico-left { position: absolute; left: 14px; color: #9CA3AF; width: 18px; height: 18px; pointer-events: none; }
        .ico-right { position: absolute; right: 14px; color: #9CA3AF; cursor: pointer; width: 18px; height: 18px; }

        /* Submit */
        .submit-btn {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: background 0.18s; margin-top: 8px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .submit-btn:hover:not(:disabled) { background: var(--primary-hover); }
        .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; }

        /* Spinner */
        .spinner {
            width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4);
            border-top-color: white; border-radius: 50%;
            animation: spin 0.7s linear infinite; display: none;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Footer note */
        .footer-note { text-align: center; font-size: 12px; color: var(--muted); margin-top: 24px; }
        .footer-note a { color: var(--primary); text-decoration: none; }
        .footer-note a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-wrap">
        <img src="../assets\logo.png" alt="Travel-PA">
    </div>

    <h1>Welcome back</h1>

    <div id="errorBox" class="error-box"></div>

    <div class="tabs">
        <button type="button" class="tab-btn active" id="tabAdmin" onclick="switchRole('admin')">Admin</button>
        <button type="button" class="tab-btn"        id="tabAgent" onclick="switchRole('agent')">Agent</button>
    </div>

    <form id="loginForm" novalidate>

        <div class="field">
            <label id="idLabel" for="identityField">Admin ID</label>
            <div class="input-wrap">
                <svg class="ico-left" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
                <input type="text" id="identityField" placeholder="Enter your admin ID" autocomplete="username">
            </div>
        </div>

        <div class="field">
            <label for="passwordField">Password</label>
            <div class="input-wrap">
                <svg class="ico-left" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                </svg>
                <input type="password" id="passwordField" placeholder="Enter your password" autocomplete="current-password">
                <!-- Eye open -->
                <svg id="eyeOpen" class="ico-right" onclick="togglePassword()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
                <!-- Eye closed -->
                <svg id="eyeClosed" class="ico-right" onclick="togglePassword()" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
            </div>
        </div>

        <button type="submit" class="submit-btn" id="loginBtn">
            <div class="spinner" id="spinner"></div>
            <span id="btnText">Login</span>
        </button>
    </form>

    <p class="footer-note">Having trouble? <a href="mailto:support@travel-pa.com">Contact support</a></p>
</div>

<script>
    let activeRole = 'admin';
    let passwordVisible = false;

    function switchRole(role) {
        activeRole = role;
        document.getElementById('tabAdmin').classList.toggle('active', role === 'admin');
        document.getElementById('tabAgent').classList.toggle('active', role === 'agent');

        const label   = document.getElementById('idLabel');
        const field   = document.getElementById('identityField');

        if (role === 'agent') {
            label.textContent      = 'Email';
            field.type             = 'email';
            field.placeholder      = 'Enter your email address';
            field.autocomplete     = 'email';
        } else {
            label.textContent      = 'Admin ID';
            field.type             = 'text';
            field.placeholder      = 'Enter your admin ID';
            field.autocomplete     = 'username';
        }

        field.value = '';
        hideError();
    }

    function togglePassword() {
        passwordVisible = !passwordVisible;
        document.getElementById('passwordField').type = passwordVisible ? 'text' : 'password';
        document.getElementById('eyeOpen').style.display   = passwordVisible ? 'none'  : 'block';
        document.getElementById('eyeClosed').style.display = passwordVisible ? 'block' : 'none';
    }

    function showError(msg) {
        const b = document.getElementById('errorBox');
        b.textContent = msg;
        b.style.display = 'block';
    }
    function hideError() {
        document.getElementById('errorBox').style.display = 'none';
    }

    function setLoading(on) {
        const btn     = document.getElementById('loginBtn');
        const spinner = document.getElementById('spinner');
        const txt     = document.getElementById('btnText');
        btn.disabled       = on;
        spinner.style.display = on ? 'block' : 'none';
        txt.textContent    = on ? 'Logging in…' : 'Login';
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideError();

        const identity = document.getElementById('identityField').value.trim();
        const password = document.getElementById('passwordField').value;

        // Client-side validation
        if (!identity) return showError(activeRole === 'agent' ? 'Email is required.' : 'Admin ID is required.');
        if (activeRole === 'agent' && !identity.includes('@')) return showError('Please enter a valid email address.');
        if (!password)  return showError('Password is required.');

        setLoading(true);

        try {
            const body = {
                role:     activeRole,
                password: password,
                ...(activeRole === 'agent'
                    ? { email: identity }
                    : { adminId: identity })
            };

            const res  = await fetch('/api/auth/login', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(body)
            });
            const data = await res.json();

            if (data.success) {
                localStorage.setItem('crm_token', data.token);
                localStorage.setItem('crm_role',  activeRole);
                window.location.href = data.redirect;
            } else {
                showError(data.message || 'Invalid credentials. Please try again.');
            }
        } catch {
            showError('Cannot connect to server. Please check your connection.');
        } finally {
            setLoading(false);
        }
    });
</script>
</body>
</html>
